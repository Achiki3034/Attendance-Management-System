{% extends 'base.html' %}
{% block title %}Create User | CheckinHub{% endblock %}
{% block page_title %}Create New User{% endblock %}
{% block content %}
<div class="form-card">
  <form method="POST" action="{{ url_for('admin.create_user') }}">
    <div class="form-grid">
      <div class="form-group"><label>Full Name</label><input type="text" name="full_name" class="form-control"
          placeholder="Enter full name" required /></div>
      <div class="form-group"><label>Email Address</label><input type="email" name="email" class="form-control"
          placeholder="user@university.edu" required /></div>
      <div class="form-group"><label>Staff / Student ID</label><input type="text" name="student_id" class="form-control"
          placeholder="e.g. LEC001 or STU2024001" /></div>
      <div class="form-group"><label>Role</label><select name="role" class="form-control">
          <option value="student">Student</option>
          <option value="lecturer">Lecturer</option>
          <option value="admin">Admin</option>
        </select></div>
      <div class="form-group full-width"><label>Default Password</label><input type="text" name="password"
          class="form-control" value="Password@123" /><small>User should change this after first login.</small></div>
    </div>
    <div class="form-actions">
      <a href="{{ url_for('admin.users') }}" class="btn-secondary">Cancel</a>
      <button type="submit" class="btn-primary">Create User</button>
    </div>
  </form>
</div>
{% endblock %}

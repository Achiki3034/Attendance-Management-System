{% extends 'base.html' %}
{% block title %}Create Course | CheckinHub{% endblock %}
{% block page_title %}Create New Course{% endblock %}
{% block content %}
<div class="form-card">
  <form method="POST" action="{{ url_for('admin.create_course') }}">
    <div class="form-grid">
      <div class="form-group"><label>Course Code</label><input type="text" name="course_code" class="form-control"
          placeholder="e.g. CS301" required /></div>
      <div class="form-group"><label>Course Name</label><input type="text" name="course_name" class="form-control"
          placeholder="e.g. Data Structures" required /></div>
      <div class="form-group"><label>Department</label><input type="text" name="department" class="form-control"
          placeholder="e.g. Computer Science" required /></div>
      <div class="form-group"><label>Semester</label><input type="text" name="semester" class="form-control"
          placeholder="e.g. Semester 1 2024" required /></div>
      <div class="form-group full-width"><label>Assign Lecturer</label>
        <select name="lecturer_id" class="form-control">
          <option value="">-- Assign Later --</option>
          {% for l in lecturers %}<option value="{{ l.id }}">{{ l.full_name }} ({{ l.email }})</option>{% endfor %}
        </select>
      </div>
    </div>
    <div class="form-actions">
      <a href="{{ url_for('admin.courses') }}" class="btn-secondary">Cancel</a>
      <button type="submit" class="btn-primary">Create Course</button>
    </div>
  </form>
</div>
{% endblock %}
